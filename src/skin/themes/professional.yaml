name: Professional
description: Corporate yet modern — clean, structured, and trustworthy

light:
  bgPrimary: "#FFFFFF"
  bgSecondary: "#F8FAFC"
  textPrimary: "#1A202C"
  textSecondary: "#4A5568"
  accent: "#0055FF"
  accentHover: "#0044CC"
  accentSecondary: "#00AA77"
  accentTertiary: null
  border: "#E2E8F0"
  shadow: "rgba(0, 0, 0, 0.08)"
  borderRadius: "0.375rem"
  transition: "0.25s ease-out"
  glow: "none"
  gradient: "linear-gradient(135deg, #0055FF 0%, #00AA77 100%)"
  spacingSection: "5rem"
  spacingCard: "1.75rem"
  spacingElement: "1.25rem"
  fontBody: "'Inter', 'Helvetica Neue', Arial, sans-serif"
  fontHeading: "'Inter', 'Helvetica Neue', Arial, sans-serif"
  fontMono: "'JetBrains Mono', monospace"
  headingWeight: "600"
  bodyLineHeight: "1.7"
  contentMaxWidth: "960px"
  headingLetterSpacing: "-0.01em"
  buttonTextColor: "#1A202C"
  buttonTextShadow: "none"
  scanlineOpacity: "0"

dark:
  bgPrimary: "#0F172A"
  bgSecondary: "#1E293B"
  textPrimary: "#F1F5F9"
  textSecondary: "#94A3B8"
  accent: "#3B82F6"
  accentHover: "#60A5FA"
  accentSecondary: "#10B981"
  accentTertiary: null
  border: "#334155"
  shadow: "rgba(59, 130, 246, 0.15)"
  borderRadius: "0.375rem"
  transition: "0.25s ease-out"
  glow: "none"
  gradient: "linear-gradient(135deg, #3B82F6 0%, #10B981 100%)"
  spacingSection: "5rem"
  spacingCard: "1.75rem"
  spacingElement: "1.25rem"
  fontBody: "'Inter', 'Helvetica Neue', Arial, sans-serif"
  fontHeading: "'Inter', 'Helvetica Neue', Arial, sans-serif"
  fontMono: "'JetBrains Mono', monospace"
  headingWeight: "600"
  bodyLineHeight: "1.7"
  contentMaxWidth: "960px"
  headingLetterSpacing: "-0.01em"
  buttonTextColor: "#fff"
  buttonTextShadow: "none"
  scanlineOpacity: "0"
