name: Vaporwave
description: Retro-futuristic 80s/90s nostalgia with a cyber-Japanese aesthetic

light:
  bgPrimary: "#FFD6E8"
  bgSecondary: "#D4F1F4"
  textPrimary: "#2D1B4E"
  textSecondary: "#6B4D8A"
  accent: "#FF00FF"
  accentHover: "#CC00CC"
  accentSecondary: "#00FFFF"
  accentTertiary: "#FFFF00"
  border: "#B794F4"
  shadow: "rgba(255, 0, 255, 0.2)"
  borderRadius: "1rem"
  transition: "0.35s ease-in-out"
  glow: "0 0 40px rgba(255, 0, 255, 0.5)"
  gradient: "linear-gradient(135deg, #FF00FF 0%, #00FFFF 50%, #FFFF00 100%)"
  spacingSection: "6rem"
  spacingCard: "2rem"
  spacingElement: "1.5rem"
  fontBody: "'Space Mono', 'Courier New', monospace"
  fontHeading: "'Exo 2', 'Impact', sans-serif"
  fontMono: "'Space Mono', 'Courier New', monospace"
  headingWeight: "800"
  bodyLineHeight: "1.75"
  contentMaxWidth: "900px"
  headingLetterSpacing: "0.02em"
  buttonTextColor: "#fff"
  buttonTextShadow: "0 2px 6px rgba(0, 0, 0, 0.6), 0 0 12px rgba(0, 0, 0, 0.4)"
  scanlineOpacity: "0.03"

dark:
  bgPrimary: "#1A0033"
  bgSecondary: "#2D0052"
  textPrimary: "#FFD6E8"
  textSecondary: "#D4A5F9"
  accent: "#FF00FF"
  accentHover: "#FF4DFF"
  accentSecondary: "#00FFFF"
  accentTertiary: "#FFFF00"
  border: "#6B2E8A"
  shadow: "rgba(255, 0, 255, 0.3)"
  borderRadius: "1rem"
  transition: "0.35s ease-in-out"
  glow: "0 0 50px rgba(255, 0, 255, 0.6)"
  gradient: "linear-gradient(135deg, #FF00FF 0%, #00FFFF 50%, #FFFF00 100%)"
  spacingSection: "6rem"
  spacingCard: "2rem"
  spacingElement: "1.5rem"
  fontBody: "'Space Mono', 'Courier New', monospace"
  fontHeading: "'Exo 2', 'Impact', sans-serif"
  fontMono: "'Space Mono', 'Courier New', monospace"
  headingWeight: "800"
  bodyLineHeight: "1.75"
  contentMaxWidth: "900px"
  headingLetterSpacing: "0.02em"
  buttonTextColor: "#fff"
  buttonTextShadow: "0 2px 6px rgba(0, 0, 0, 0.6), 0 0 12px rgba(0, 0, 0, 0.4)"
  scanlineOpacity: "0.03"
