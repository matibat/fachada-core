name: Modern Tech
description: Futuristic and dynamic with an advanced-technology feel

light:
  bgPrimary: "#F0F4F8"
  bgSecondary: "#FFFFFF"
  textPrimary: "#0f0f0f"
  textSecondary: "#4A5568"
  accent: "#0095C8"
  accentHover: "#0077A3"
  accentSecondary: "#6D3FD9"
  accentTertiary: null
  border: "#CBD5E0"
  shadow: "rgba(0, 149, 200, 0.12)"
  borderRadius: "0.75rem"
  transition: "0.3s cubic-bezier(0.4, 0, 0.2, 1)"
  glow: "0 0 20px rgba(0, 149, 200, 0.25)"
  gradient: "linear-gradient(135deg, #0095C8 0%, #6D3FD9 100%)"
  spacingSection: "6rem"
  spacingCard: "1.5rem"
  spacingElement: "1rem"
  fontBody: "'Inter', 'Helvetica Neue', Arial, sans-serif"
  fontHeading: "'Space Grotesk', 'Inter', sans-serif"
  fontMono: "'JetBrains Mono', 'Fira Code', monospace"
  headingWeight: "700"
  bodyLineHeight: "1.65"
  contentMaxWidth: "1100px"
  headingLetterSpacing: "-0.03em"
  buttonTextColor: "#0f0f0f"
  buttonTextShadow: "none"
  scanlineOpacity: "0"

dark:
  bgPrimary: "#080C10"
  bgSecondary: "#0F1620"
  textPrimary: "#E8EFF5"
  textSecondary: "#8A9BB0"
  accent: "#00D4FF"
  accentHover: "#00BBDF"
  accentSecondary: "#8B5CF6"
  accentTertiary: "#00FF88"
  border: "#1E2D40"
  shadow: "rgba(0, 212, 255, 0.2)"
  borderRadius: "0.75rem"
  transition: "0.3s cubic-bezier(0.4, 0, 0.2, 1)"
  glow: "0 0 30px rgba(0, 212, 255, 0.4)"
  gradient: "linear-gradient(135deg, #00D4FF 0%, #8B5CF6 100%)"
  spacingSection: "6rem"
  spacingCard: "1.5rem"
  spacingElement: "1rem"
  fontBody: "'Inter', 'Helvetica Neue', Arial, sans-serif"
  fontHeading: "'Space Grotesk', 'Inter', sans-serif"
  fontMono: "'JetBrains Mono', 'Fira Code', monospace"
  headingWeight: "700"
  bodyLineHeight: "1.65"
  contentMaxWidth: "1100px"
  headingLetterSpacing: "-0.03em"
  buttonTextColor: "#fff"
  buttonTextShadow: "none"
  scanlineOpacity: "0"
